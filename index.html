<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <canvas></canvas>
    <div id="controls">
      <label>gravity
        <input type="range" id="gravity" min="0" max="20" step="0.1" value="5">
        <span id="gravity-val">5.0</span>
      </label>
      <label>mouse force
        <input type="range" id="mouseForce" min="-600" max="600" step="10" value="200">
        <span id="mouseForce-val">200</span>
      </label>
      <label>viscosity
        <input type="range" id="viscosity" min="0" max="0.2" step="0.005" value="0.04">
        <span id="viscosity-val">0.04</span>
      </label>
      <label>particle size
        <input type="range" id="particleSize" min="1" max="14" step="0.5" value="2">
        <span id="particleSize-val">2.0</span>
      </label>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
